# ============================================================
# PORTFOLIO CONFIGURATION
# This file is in the YAML format and is very sensitive to 
# spaces. Ensure to match the indentation level and spacing
# of new items with existing ones

# Edit all lines marked [YOUR ...] to customize your site
# ============================================================

site_name: "Surendra Shiwakoti - Geospatial Portfolio"
site_description: "Portfolio of Surendra Shiwakoti — GIS, Remote Sensing, and Spatial Data Science"
site_author: "Surendra Shiwakoti"
# After your site is live, uncomment and set this to your actual GitHub Pages URL:
site_url: "https://shiwakotisurendra.github.io/"

theme:
  name: material
  # Icon used as both the site logo (header) and browser favicon.
  # Browse icons at https://squidfunk.github.io/mkdocs-material/reference/icons-emojis/
  # and replace "material/earth" with any "material/..." icon name you prefer.
  icon:
    logo: material/earth
  palette:
    # To change the color, edit the 'primary' and 'accent' values below for both
    # the 'default' (light) and 'slate' (dark) schemes.
    # Available colors: red, pink, purple, deep purple, indigo, blue, light blue,
    # cyan, teal, green, light green, lime, yellow, amber, orange, deep orange
    - scheme: default            # Light mode
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate              # Dark mode
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs            # Top-level nav items shown as horizontal tabs
    - navigation.top             # Back-to-top button when scrolling up
    - navigation.sections
    - navigation.expand
    - toc.follow
    - content.code.copy          # Copy button on all code blocks
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html        # Allows Markdown inside HTML blocks (used for project cards)
  - attr_list         # Allows adding CSS classes to elements: ![img](url){ .class }
  - admonition        # Note/warning/tip boxes
  - pymdownx.details  # Collapsible admonition blocks
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:   # Renders :material-icon: and :fontawesome-brands-icon: inline icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "Copyright &copy; [YOUR NAME]"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shiwakotisurendra
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/geosuren
    - icon: material/email
      link: mailto:shiwakotisurendra@gmail.com


plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - "Sample Project": projects/sample-project.md
    - "Jupyter Notebook Project": projects/sample-notebook.ipynb
    # HOW TO ADD A NEW PROJECT:
    # 1. Copy docs/projects/sample-project.md to docs/projects/your-project-name.md
    #    (or drop an .ipynb file into docs/projects/ for a Jupyter notebook project)
    # 2. Edit the new file with your project content
    # 3. Add a line below (same format): - "Your Project Title": projects/your-project-name.md
    # 4. Add a project card on docs/projects/index.md
  - Publications: publications.md
  - Experience: experience.md
  - Resources: resources.md
  - Tutorials:
    - "InfoTool": Tutorials/infoTool_reference.md
    - "python": Tutorials/python.md 
    - "Raster Analysis": Tutorials/Tutorials.md
    - "Vector Analysis": Tutorials/vector_analysis.md
    - "Automate QGIS": Tutorials/automate_qgis.md
    - "Automate ArcGIS": Tutorials/automate_arcgis.md
    - "gdal": Tutorials/gdal.md
    - "Matplotlib methods": Tutorials/matplotlib_methods.md
    - "plotly": Tutorials/plotly.md
    - "Pandas": Tutorials/pandas.md
    - "Numpy": Tutorials/numpy.md
    - "Xarray and Rioxarray": Tutorials/xarray_and_rioxarray.md
    - "folium": Tutorials/folium.md
    - "geemap": Tutorials/geemap.md
    - "opencv": Tutorials/opencv.md
    - "scikit-learn": Tutorials/scikit-learn.md
    - "scikit-learn examples": Tutorials/scikit-learn_examples.md
    - "earthpy": Tutorials/earthpy.md
  - Contact: contact.md
